# which directories should be walked to find git repositories?
scandirs:

  # a list of one/more starting points
  # this will have env vars expanded
  include:
    - $HOME/apps
    - $HOME/code
    - $HOME/dev
    - $HOME/work

  # a list of specific directories to exclude from the scan
  # this will have env vars expanded
  exclude:
    - $GOPATH/pkg

# which files to ignore inside a git repo
# any .gitignore file in your repo will be adhered to, the config
# below allows your repo to consider files to be added but
# ignored by dirtygit
gitignore:

  fileglob:
    - go.sum
    - log
    - "*.orig"
    - "*.old"
    - "*.rpm"
    - "*.pyc"
    - .DS_Store

  dirglob:
    - vendor
    - new
    - old

# if true, walking the directory tree underneath the `include` directories
# will traverse directories pointed to be symlinks
followsymlinks: true

# branch pane: omit local-only branches (no same-named ref on any configured
# remote) whose short name matches any of these regexes
branches:
  hidelocalonly:
    regex:
      - ^gitbutler/ # hide local-only branches created by gitbutler

  # local branch names to always show when present, even when every remote tip matches
  default:
    - main
    - master

# Open repository from the TUI (key `e`): argv for exec (no shell).
# Put the literal {repo} in any argument to substitute the absolute repo path.
# If {repo} never appears, the path is appended as the last argument.
# Environment variables in each argument are expanded.
edit:
  command:
    - code
